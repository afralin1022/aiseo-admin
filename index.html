<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO 客戶管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .nav-active {
            background-color: #2563eb;
            color: white;
            border-radius: 0.5rem;
        }

        .excel-input:focus {
            background-color: #f0f7ff;
            border-color: #3b82f6;
            outline: none;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="bg-slate-50 font-sans">

    <div id="login-page" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-slate-800 tracking-tight">SEO 後台管理</h1>
                <p class="text-slate-500 mt-2">請選擇身份並登入</p>
            </div>
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">電子郵件 / 帳號</label>
                    <input type="email" id="email" required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                        placeholder="admin@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">登入密碼</label>
                    <input type="password" id="password" required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                        placeholder="••••••••">
                </div>
                <div class="bg-slate-50 p-3 rounded-lg flex gap-4 justify-center text-sm border">
                    <label class="flex items-center cursor-pointer font-medium text-slate-600">
                        <input type="radio" name="role" value="client" checked class="mr-2 w-4 h-4"> 客戶端入口
                    </label>
                    <label class="flex items-center cursor-pointer font-medium text-slate-600">
                        <input type="radio" name="role" value="admin" class="mr-2 w-4 h-4"> 管理者入口
                    </label>
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">進入系統</button>
            </form>
        </div>
    </div>

    <div id="main-system" class="hidden flex min-h-screen">
        <aside class="w-64 bg-slate-900 text-white flex flex-col sticky top-0 h-screen">
            <div class="p-6 text-xl font-bold border-b border-slate-800 text-blue-400 flex items-center">
                <i data-lucide="line-chart" class="mr-2"></i> SEO Manager
            </div>
            <nav class="flex-1 mt-6 px-4 space-y-2" id="nav-links">
            </nav>
            <div class="p-4 border-t border-slate-800">
                <button id="logout-btn"
                    class="w-full flex items-center px-4 py-3 text-slate-400 hover:text-white hover:bg-red-900/30 rounded-lg transition">
                    <i data-lucide="log-out" class="mr-3 w-5"></i> 登出系統
                </button>
            </div>
        </aside>

        <main class="flex-1 p-10">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h2 id="page-title" class="text-3xl font-bold text-slate-800">歡迎回來</h2>
                    <p id="page-desc" class="text-slate-500 mt-1">今天想做些什麼？</p>
                </div>
                <div class="flex items-center gap-4 bg-white p-2 pr-4 rounded-full border shadow-sm">
                    <div
                        class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center font-bold shadow-md">
                        K</div>
                    <span id="user-display" class="text-slate-700 font-semibold text-sm"></span>
                </div>
            </header>

            <div id="content-area" class="animate-in fade-in duration-500">
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
